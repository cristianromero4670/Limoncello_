<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Limoncello | Galería Artesanal</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- Background -->
  <div class="background"></div>

  <!-- Ambient glow -->
  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>

  <main class="container">

    <!-- HERO -->
    <section class="hero">

      <div class="hero-content">

        <!-- LOGO -->
        <div class="hero-logo">
          <img src="src/Logo.png" alt="Logo">
        </div>

        <!-- Divider -->
        <div class="hero-line"></div>

        <!-- Button -->
        <a
          class="catalog-btn"
          href="https://drive.google.com/file/d/1d99kbZji4_5EqLGbgkI4rjc4PU8SVx9_/view?usp=sharing"
          target="_blank">

          <span>Conoce la colección actual</span>

          <i class="fa-solid fa-arrow-right"></i>

        </a>

      </div>

    </section>

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- Logo -->
      <div class="logo">
        <img src="src/Logo_links.png" alt="Logo">
      </div>

      <!-- Menu -->
      <nav class="menu">

        <a
          href="https://www.instagram.com/limoncello_tlaquepaque"
          target="_blank">

          <i class="fa-brands fa-instagram"></i>
          <span>Instagram</span>

        </a>

        <a
          href="https://www.tiktok.com/@limoncello_tlaquepaque"
          target="_blank">

          <i class="fa-brands fa-tiktok"></i>
          <span>TikTok</span>

        </a>

        <a
          href="https://wa.me/5213327999368"
          target="_blank">

          <i class="fa-brands fa-whatsapp"></i>
          <span>WhatsApp</span>

        </a>

        <a
          href="https://maps.app.goo.gl/qP7YtFYkr8doS1pXA"
          target="_blank">

          <i class="fa-solid fa-location-dot"></i>
          <span>Ubicación</span>

        </a>

      </nav>

      <!-- Socials -->
      <div class="socials">

        <a href="#">
          <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="#">
          <i class="fa-brands fa-tiktok"></i>
        </a>

        <a href="#">
          <i class="fa-brands fa-whatsapp"></i>
        </a>

      </div>

    </aside>

  </main>

  <!-- JS -->
  <script src="script.js"></script>

</body>

</html>
