<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Galería Artesanal</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Background -->
  <div class="background"></div>

  <main class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div>

        <!-- Logo -->
        <div class="logo">

          <img src="src/logo.png" alt="Logo Galería Artesanal">

          <h1>GALERÍA</h1>

          <span>ARTESANAL</span>

          <div class="divider"></div>

        </div>

        <!-- Menu -->
        <nav class="menu">

          <a href="https://www.tiktok.com/" target="_blank">
            <i class="fa-brands fa-tiktok"></i>
            <span>TIKTOK</span>
          </a>

          <a href="https://www.instagram.com/" target="_blank">
            <i class="fa-brands fa-instagram"></i>
            <span>INSTAGRAM</span>
          </a>

          <a href="https://wa.me/" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
            <span>WHATSAPP</span>
          </a>

          <a href="#">
            <i class="fa-solid fa-landmark"></i>
            <span>SOBRE LA GALERÍA</span>
          </a>

        </nav>

      </div>

      <!-- Bottom Socials -->
      <div class="bottom">

        <div class="socials">

          <a href="https://www.tiktok.com/" target="_blank">
            <i class="fa-brands fa-tiktok"></i>
          </a>

          <a href="https://wa.me/" target="_blank">
            <i class="fa-brands fa-whatsapp"></i>
          </a>

        </div>

      </div>

    </aside>

    <!-- HERO -->
    <section class="hero">

      <h2>
        Arte hecho <br>
        a mano.
      </h2>

      <div class="hero-line"></div>

      <!-- CTA -->
      <div class="cta">

        <a href="https://drive.google.com/file/d/1d99kbZji4_5EqLGbgkI4rjc4PU8SVx9_/view?usp=sharing"
          target="_blank">

          CONOCE LA COLECCIÓN ACTUAL

          <i class="fa-solid fa-arrow-right"></i>

        </a>

      </div>

    </section>

  </main>

  <!-- JS -->
  <script src="script.js"></script>

</body>

</html>
